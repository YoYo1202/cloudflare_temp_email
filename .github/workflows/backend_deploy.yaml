name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    strategy:
      matrix:
        target:
          - name: yoyo-hw.xyz
            secret: BACKEND_TOML
          - name: mail.hw-yoyo.xyz
            secret: BACKEND_TOML_MAIL
    name: Deploy ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Build frontend
        run: |
          cd frontend/
          pnpm install --no-frozen-lockfile
          echo "Building with normal pages"
          pnpm build:pages
          cd ..

      - name: Deploy ${{ matrix.target.name }}
        run: |
          cd worker/
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          pnpm install --no-frozen-lockfile
          pnpm run deploy
          echo "Deployed ${{ matrix.target.name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets[matrix.target.secret] }}
